spring:
  application:
    name: backend

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-development-secret-key-before-production-use}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

  upload:
    cv:
      storage-dir: ${APP_CV_UPLOAD_DIR:uploads/cvs}
      max-file-size-bytes: ${APP_CV_MAX_FILE_SIZE_BYTES:10485760}

  ai-service:
    base-url: ${APP_AI_SERVICE_BASE_URL:http://localhost:8000}
    connect-timeout: ${APP_AI_SERVICE_CONNECT_TIMEOUT:2s}
    read-timeout: ${APP_AI_SERVICE_READ_TIMEOUT:15s}

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

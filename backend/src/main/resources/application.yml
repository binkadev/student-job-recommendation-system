spring:
  application:
    name: backend
  profiles:
    default: no-db
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-development-secret-key-before-production-use}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  upload:
    cv:
      storage-dir: ${APP_CV_UPLOAD_DIR:uploads/cvs}
      max-file-size-bytes: ${APP_CV_MAX_FILE_SIZE_BYTES:10485760}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: no-db
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
